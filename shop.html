<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>

  <style>
    body {
    h1 {
    }
        text-align: center;

    /* 🔲 This is the “spots” layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    /* 🧱 Each card slot */
    .shop {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 20px;
  padding: 20px;
  justify-items: center;
}

.card {
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  background: white;
  text-align: center;
  width: 100%;
  max-width: 200px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 8px;
}

    .price {
      font-weight: bold;
      margin: 8px 0;
    }

    button {
      background: black;
      color: white;
      border: white;
      padding: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Card Shop</h1>

<div class="shop" id="shop"></div>
  <!-- scrip for the cards to be pushed onto a list -->
<script>
const cards = [
  { name: "", price: "", img: "" },
];


  function renderShop() {
  shop.innerHTML = "";

  cards.forEach(card => {
    shop.innerHTML += `
      <div class="card">
        <img src="${card.img}">
        <h3>${card.name}</h3>
        <p>${card.price}</p>
          <button>Buy</button>
      </div>
    `;
  });
}
    renderShop();
  cards.push({ name: "Pikachu", price: "$5", img: "IMG_2322.jpg" });
  cards.push({ name: "Charizard", price: "$20", img: "charizard.jpg" });
  cards.push({ name: "Bulbasaur", price: "$8", img: "bulba.jpg" });
renderShop();  

</script>

  
</body>
</html>
