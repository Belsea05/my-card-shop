<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>

  <style>
    body {

    h1 {
    }
        text-align: center;

    /* 🔲 This is the “spots” layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    /* 🧱 Each card slot */
    .shop {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 20px;
  padding: 20px;
  justify-items: center;
}

.card {
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 10px;
  background: white;
  text-align: center;
  width: 100%;
  max-width: 200px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 8px;
}

    .price {
      font-weight: bold;
      margin: 8px 0;
    }

    button {
      background: black;
      color: white;
      border: white;
      padding: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Card Shop</h1>

<div class="grid">

  <!-- 🃏 CARD SLOT 1 -->
  <div class="card">
    <img src="IMG_2322.jpg">
    <h3>Pikachu</h3>
    <p class="price">$5</p>
    <button>Buy</button>
  </div>

  <!-- 🃏 CARD SLOT 2 -->
  <div class="card">
    <img src="IMG_2322.jpg">
    <h3>Charizard</h3>

  </div>

  <!-- 🃏 CARD SLOT 3 -->
  <div class="card">
    <img src="IMG_2322.jpg">

    <button>Buy</button>
  </div>

<div class="card">

</div>

</div>

</html>
