<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>

  <style>
    body {

    h1 {
      text-align: center;
    }

    /* 🔲 This is the “spots” layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    /* 🧱 Each card slot */
    .shop {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.card {
  display: inline-block;
  width: auto;
  padding: 2;
  margin: 2;
  background: none;
  border: white;
  box-shadow: none;
}

.card img {
  display: block;
  max-width: 200px;
  height: auto;
}

    .price {
      font-weight: bold;
      margin: 8px 0;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Card Shop</h1>

<div class="grid">

  <!-- 🃏 CARD SLOT 1 -->
  <div class="card">
    <img src="IMG_2322.jpg">
    <h3>Pikachu</h3>
    <p class="price">$5</p>
    <button>Buy</button>
  </div>

  <!-- 🃏 CARD SLOT 2 -->
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Charizard</h3>
    <p class="price">$20</p>
    <button>Buy</button>
  </div>

  <!-- 🃏 CARD SLOT 3 -->
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Trainer Card</h3>
    <p class="price">$12</p>
    <button>Buy</button>
  </div>

</div>

</body>
</html>
